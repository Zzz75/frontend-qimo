<!doctype html>
<!-- 声明这是 HTML5 文档 -->
<html lang="zh-CN">
  <!-- lang="zh-CN" 表示页面主要语言是简体中文，有利于搜索引擎和无障碍 -->
  <head>
    <!-- head：浏览器读取的「元信息」，用户一般看不到 -->
    <meta charset="UTF-8" />
    <!-- 字符编码 UTF-8，支持中文等各国文字 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 让页面在手机上也能按屏幕宽度正确缩放 -->
    <title>智能聊天助手</title>
    <!-- 浏览器标签页上显示的名称 -->
  </head>
  <body>
    <!-- body：用户真正看到的页面内容区域 -->
    <div id="app"></div>
    <!-- 空容器：Vue 会把整个应用界面「画」在这个 div 里 -->
    <script type="module" src="/src/main.ts"></script>
    <!-- 加载并运行前端入口 main.ts；type="module" 表示用 ES 模块方式 -->
  </body>
</html>
